apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-config
  namespace: ds551-2025fall-fd672e
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka-team07:9092"
  KAFKA_TOPIC: "ds551-f25.team07.symptom_reports"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "epidemic"
  POSTGRES_USER: "ds551"
  TEAM_ID: "07"

---
apiVersion: v1
kind: Secret
metadata:
  name: spark-secrets
  namespace: ds551-2025fall-fd672e
type: Opaque
stringData:
  POSTGRES_PASSWORD: "ds551pw"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-symptom-analytics
  namespace: ds551-2025fall-fd672e
  labels:
    app: spark-analytics
    component: symptom-processor
    team: team07
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-analytics
      component: symptom-processor
  template:
    metadata:
      labels:
        app: spark-analytics
        component: symptom-processor
        team: team07
    spec:
      containers:
      - name: spark-app
        image: shraav13/spark-symptom-team07:latest
        imagePullPolicy: Always
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: spark-config
              key: KAFKA_BOOTSTRAP_SERVERS
        - name: KAFKA_TOPIC
          valueFrom:
            configMapKeyRef:
              name: spark-config
              key: KAFKA_TOPIC
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: spark-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: spark-config
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: spark-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: spark-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: spark-secrets
              key: POSTGRES_PASSWORD
        - name: TEAM_ID
          valueFrom:
            configMapKeyRef:
              name: spark-config
              key: TEAM_ID
        resources:
          requests:
            memory: "1.5Gi"
            cpu: "500m"
          limits:
            memory: "3Gi"
            cpu: "1000m"
        volumeMounts:
        - name: checkpoint-volume
          mountPath: /tmp/checkpoint
      volumes:
      - name: checkpoint-volume
        emptyDir: {}
      restartPolicy: Always
